<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMALI TECH MD | PAIR CODE</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Orbitron:wght@600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --cyan:#00ffea;
  --cyan-light:#00e5ff;
  --blue:#00b7ff;
  --panel:rgba(10,15,25,.88);
  --text:#eaffff;
  --text-dim:#8a9bb5;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  font-family:'Poppins',sans-serif;
  color:var(--text);
  background:url("https://i.ibb.co/XfYqpkmm/be2de0bd1b96.jpg") center/cover no-repeat fixed;
  overflow:hidden;
  position:relative;
}

/* Dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:0;
  transition:background 0.3s ease;
}

/* CARD */
.frame{
  position:relative;
  z-index:2;
  max-width:450px;
  margin:auto;
  top:12%;
  padding:38px 34px;
  border-radius:32px;
  background:var(--panel);
  backdrop-filter:blur(18px);
  text-align:center;
  border:2px solid transparent;
  animation:borderFlow 5s linear infinite;
  box-shadow:0 0 50px rgba(0,255,234,.35);
}

@keyframes borderFlow{
  0%{border-image:linear-gradient(0deg,var(--cyan),var(--blue)) 1}
  100%{border-image:linear-gradient(360deg,var(--cyan),var(--blue)) 1}
}

/* Bot Avatar */
.bot-avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid var(--cyan);
  box-shadow:0 0 20px rgba(0,255,234,.4);
  margin:0 auto 20px;
  object-fit:cover;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-family:'Orbitron',monospace;
  font-size:1.3rem;
  letter-spacing:2px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

/* LANGUAGE SWITCH */
.lang{
  display:flex;
  gap:8px;
}

.lang button{
  padding:6px 12px;
  border-radius:20px;
  border:1px solid rgba(0,255,234,.3);
  background:#020814;
  color:var(--text);
  font-size:.7rem;
  cursor:pointer;
  transition:all 0.3s;
}

.lang button.active{
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:#0a0c15;
  border-color:transparent;
  font-weight:bold;
}

/* SUBTITLE */
#subtitle{
  font-size:.7rem;
  letter-spacing:3px;
  opacity:.7;
  margin-bottom:28px;
  color:var(--text-dim);
}

/* INPUT */
.input-container{
  display:flex;
  gap:12px;
}

input{
  flex:1;
  padding:14px 18px;
  border-radius:30px;
  background:#020814;
  border:1px solid rgba(0,255,234,.3);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:1rem;
}

input:focus{
  outline:none;
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,255,234,.2);
}

button.main{
  padding:14px 22px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:700;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:#0a0c15;
  font-size:.9rem;
  transition:transform 0.2s;
}

button.main:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(0,255,234,.5);
}

/* MESSAGE */
#waiting-message{
  display:none;
  margin-top:20px;
  padding:14px;
  background:#010614;
  border-radius:20px;
  font-family:'JetBrains Mono',monospace;
  font-size:.85rem;
  text-align:left;
  border-left:3px solid var(--cyan);
}

#copy-btn{
  display:none;
  margin-top:18px;
  width:100%;
  border-radius:40px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  font-weight:700;
  border:none;
  padding:12px;
  cursor:pointer;
  transition:all 0.2s;
}

#copy-btn:hover{
  transform:scale(1.01);
  box-shadow:0 0 15px rgba(0,255,234,.5);
}

/* Pairing Code Footer */
.pairing-footer{
  margin-top:20px;
  font-size:.65rem;
  color:var(--text-dim);
  border-top:1px solid rgba(0,255,234,.2);
  padding-top:15px;
}

.pairing-footer span{
  color:var(--cyan);
  font-weight:bold;
}

/* FLOATING WHATSAPP */
.msg-btn{
  position:fixed;
  bottom:22px;
  right:22px;
  background:linear-gradient(135deg,#25d366,var(--cyan));
  color:#0a0c15;
  padding:12px 20px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 0 25px rgba(0,255,234,.6);
  animation:float 2s ease-in-out infinite;
  z-index:5;
  font-family:'Poppins',sans-serif;
}

@keyframes float{
  50%{transform:translateY(-8px)}
}

/* CONTROL BUTTONS */
.controls{
  position:fixed;
  bottom:22px;
  left:22px;
  display:flex;
  gap:12px;
  z-index:5;
}

.controls button{
  padding:10px 16px;
  border:none;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:#0a0c15;
  box-shadow:0 0 15px rgba(0,255,234,.5);
  transition:all 0.2s;
}

.controls button:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(0,255,234,.7);
}

audio{display:none}

/* Footer */
.footer{
  position:fixed;
  bottom:12px;
  left:0;
  right:0;
  text-align:center;
  font-size:10px;
  color:rgba(255,255,255,.4);
  z-index:5;
  font-family:'JetBrains Mono',monospace;
}
</style>
</head>

<body>

<div class="frame">
  <!-- Bot Avatar -->
  <img src="https://i.ibb.co/XfYqpkmm/be2de0bd1b96.jpg" alt="JAMALI TECH MD" class="bot-avatar">
  
  <div class="top">
    <div class="title">JAMALI TECH MD</div>
    <div class="lang">
      <button id="en" class="active">EN</button>
      <button id="sw">SW</button>
    </div>
  </div>

  <div id="subtitle"></div>

  <div class="input-container">
    <input id="number" type="number" placeholder="255XXXXXXXXX">
    <button class="main" id="submit"></button>
  </div>

  <div id="waiting-message"></div>
  <button id="copy-btn"></button>
  
  <div class="pairing-footer">
    🔑 PAIRING CODE: <span>JAMALITZ</span>
  </div>
</div>

<!-- Floating WhatsApp -->
<a class="msg-btn" href="https://wa.me/255784062158" target="_blank">💬 CONTACT OWNER</a>

<!-- Controls -->
<div class="controls">
  <button id="toggle-music">🎵 MUSIC ON/OFF</button>
  <button id="toggle-overlay">🌙 OVERLAY</button>
</div>

<div class="footer">
  ⚡ JAMALI TECH MD | © 2025 JAMALI TECH EMPIRE
</div>

<audio id="bgm" src="https://files.catbox.moe/iwpfp2.mp3" loop></audio>

<script>
/* MUSIC */
const bgm=document.getElementById("bgm");
document.addEventListener("click",()=>{if(bgm.paused) bgm.play()},{once:true});
document.getElementById("toggle-music").onclick=()=>{
  if(bgm.paused){
    bgm.play();
    document.getElementById("toggle-music").textContent="🎵 MUSIC ON";
  } else {
    bgm.pause();
    document.getElementById("toggle-music").textContent="🔇 MUSIC OFF";
  }
};

/* DARK OVERLAY */
let overlayOn=true;
document.getElementById("toggle-overlay").onclick=()=>{
  overlayOn=!overlayOn;
  const pseudoStyle = document.createElement('style');
  pseudoStyle.id = 'overlay-style';
  const oldStyle = document.getElementById('overlay-style');
  if(oldStyle) oldStyle.remove();
  pseudoStyle.textContent = `body::before { background: rgba(0,0,0,${overlayOn ? '0.75' : '0'}); }`;
  document.head.appendChild(pseudoStyle);
  document.getElementById("toggle-overlay").textContent = overlayOn ? "🌙 OVERLAY ON" : "☀️ OVERLAY OFF";
};

/* LANGUAGE DATA */
const T={
  en:{sub:"PAIR CODE SYSTEM",ph:"WhatsApp Number",enter:"GENERATE",invalid:"❌ Invalid WhatsApp number",gen:"⏳ Generating pairing code...",code:"🔐 PAIR CODE: ",copy:"📋 COPY CODE",copied:"✅ COPIED!"},
  sw:{sub:"MFUMO WA PAIR CODE",ph:"Namba ya WhatsApp",enter:"ZAALISHA",invalid:"❌ Namba si sahihi",gen:"⏳ Inazalisha code...",code:"🔐 CODE: ",copy:"📋 NAKILI CODE",copied:"✅ IMENAKILIWA"}
};

let lang="en";
const subtitle=document.getElementById("subtitle");
const number=document.getElementById("number");
const submit=document.getElementById("submit");
const msg=document.getElementById("waiting-message");
const copy=document.getElementById("copy-btn");

function setLang(l){
  lang=l;
  subtitle.textContent=T[l].sub;
  number.placeholder=T[l].ph;
  submit.textContent=T[l].enter;
  document.getElementById("en").classList.toggle("active",l==="en");
  document.getElementById("sw").classList.toggle("active",l==="sw");
}
setLang("en");
en.onclick=()=>setLang("en");
sw.onclick=()=>setLang("sw");

/* PAIR CODE LOGIC */
submit.onclick=async()=>{
  let v=number.value.replace(/\D/g,"");
  if(!v.startsWith("255")){
    if(v.length===9) v="255"+v;
    else if(v.startsWith("0")) v="255"+v.slice(1);
    else if(v.length===12 && v.startsWith("255")) v=v;
    else {
      msg.style.display="block"; msg.textContent=T[lang].invalid; copy.style.display="none"; return;
    }
  }
  if(v.length<12){
    msg.style.display="block"; msg.textContent=T[lang].invalid; copy.style.display="none"; return;
  }
  
  msg.style.display="block"; msg.textContent=T[lang].gen; copy.style.display="none";
  
  try{
    const r=await fetch(`/code?number=${v}`);
    const d=await r.json();
    const code=d.code||"Unavailable";
    msg.innerHTML=`${T[lang].code}<strong style="color:#00ffea;font-size:1.2rem;"> ${code}</strong>`;
    copy.style.display="block"; copy.textContent=T[lang].copy;
    copy.onclick=()=>{
      navigator.clipboard.writeText(code); 
      copy.textContent=T[lang].copied; 
      setTimeout(()=>copy.textContent=T[lang].copy,2000);
    }
  } catch(e){
    msg.textContent="❌ Service error, try again later";
  }
};

// Enter key support
number.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") submit.click();
});
</script>

</body>
</html>
