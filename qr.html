<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JAMALI TECH MD QR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00ffea; /* active color */
  --expired: #ff6b6b; /* expired color */
  --accent2: #00b7ff;
  --bg-dark: #010101;
  --glass: rgba(10, 15, 25, 0.9);
  --text: #eaffff;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Orbitron', sans-serif;
  background:url("https://i.ibb.co/XfYqpkmm/be2de0bd1b96.jpg") center/cover no-repeat fixed;
  color: var(--text);
  overflow: hidden;
  position: relative;
}

/* Dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:0;
  transition: background 0.3s ease;
}

/* Content Card */
#content {
  position: relative;
  z-index:2;
  width:380px;
  margin:auto;
  top:12%;
  padding:30px;
  border-radius:28px;
  background: var(--glass);
  backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(0,255,234,.35);
  box-shadow:0 0 40px rgba(0,255,234,.4),0 0 50px rgba(0,255,234,.2);
  text-align:center;
}

/* Header */
#main {
  font-size:1.6rem;
  margin: 1rem 0 0.3rem 0;
  font-family: 'Orbitron', monospace;
  text-transform: uppercase;
  background: linear-gradient(135deg, #00ffea, #00b7ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 1px;
}

.legend{
  font-weight:400;
  font-size:1rem;
  margin-bottom:1rem;
  color:#8a9bb5;
}

/* QR Image */
#QR-content img{
  border-radius:20px;
  width:260px;
  box-shadow:0 0 30px rgba(0,255,234,0.6);
  margin-bottom:1rem;
  border: 2px solid rgba(0,255,234,0.3);
}

/* Neon Progress Bar */
progress{
  width:100%;
  height:14px;
  border-radius:7px;
  overflow:hidden;
  background:#111;
  border:1px solid rgba(0,255,234,.4);
  box-shadow:0 0 10px rgba(0,255,234,.3);
}
progress::-webkit-progress-bar{background:#111;}
progress::-webkit-progress-value{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.6);}
  100%{filter:brightness(1);}
}

/* Reload Button */
.reload-button{
  display:inline-block;
  margin-top:1.5rem;
  padding:12px 28px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#0a0c15;
  text-decoration:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  font-size:0.95rem;
  font-family: 'Orbitron', monospace;
  box-shadow:0 0 20px rgba(0,255,234,.5);
  transition:0.3s;
}
.reload-button:hover{
  transform:scale(1.07);
  box-shadow:0 0 30px rgba(0,255,234,.8);
}

/* Floating WhatsApp */
.msg-btn{
  position:fixed;
  bottom:22px;
  right:22px;
  background:linear-gradient(135deg,#25d366,#00ffea);
  color:#0a0c15;
  padding:14px 20px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 0 25px rgba(0,255,234,.6);
  animation:float 2s ease-in-out infinite;
  z-index:5;
  font-family: 'Orbitron', monospace;
}
@keyframes float{50%{transform:translateY(-8px)}}

/* Controls */
.controls{
  position:fixed;
  bottom:22px;
  left:22px;
  display:flex;
  gap:12px;
  z-index:5;
}
.controls button{
  padding:10px 16px;
  border:none;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#0a0c15;
  box-shadow:0 0 18px rgba(0,255,234,.5);
  font-family: 'Orbitron', monospace;
  transition:0.2s;
}
.controls button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,255,234,.8);
}

/* Footer */
.footer-note{
  margin-top: 1.5rem;
  font-size: 0.65rem;
  color: #5e6f8d;
  border-top: 1px solid rgba(0,255,234,0.2);
  padding-top: 1rem;
}
</style>
</head>
<body>

<div id="content">
  <div id="QR-content">
    <img id="qr-image" src="/server" alt="QR CODE">
  </div>
  <div id="title-container">
    <h2 id="main">JAMALI TECH MD</h2>
    <p class="legend" id="legend">Scan QR Code to Connect</p>
  </div>
  <div id="description-container">
    <progress value="0" max="30" id="progressBar"></progress>
  </div>
  <a href="javascript:history.go(0)" class="reload-button">⟳ RELOAD PAGE</a>
  <div class="footer-note">
    <i class="fas fa-lock"></i> Pairing Code: JAMALITZ
  </div>
</div>

<!-- Floating WhatsApp -->
<a class="msg-btn" href="https://wa.me/255784062158" target="_blank">💬 CONTACT OWNER</a>

<!-- Controls -->
<div class="controls">
  <button id="toggle-music">🎵 Play / Pause</button>
  <button id="toggle-overlay">🌙 Overlay</button>
</div>

<audio id="bgm" src="https://files.catbox.moe/iwpfp2.mp3" loop></audio>

<script>
// Music
const bgm=document.getElementById("bgm");
document.addEventListener("click",()=>{if(bgm.paused) bgm.play()},{once:true});
document.getElementById("toggle-music").onclick=()=>bgm.paused?bgm.play():bgm.pause();

// Dark overlay toggle
let overlayOn=true;
document.getElementById("toggle-overlay").onclick=()=>{
  overlayOn=!overlayOn;
  const styleSheet=document.styleSheets[0];
  for(let i=0;i<styleSheet.cssRules.length;i++){
    if(styleSheet.cssRules[i].selectorText=="body::before"){
      styleSheet.cssRules[i].style.background=`rgba(0,0,0,${overlayOn?0.75:0})`;
    }
  }
};

// Progress bar countdown
let timeleft = 30;
const progressBar = document.getElementById("progressBar");
const mainTitle = document.getElementById("main");
const legend = document.getElementById("legend");

const downloadTimer = setInterval(()=>{
  if(timeleft<=0){
    clearInterval(downloadTimer);
    progressBar.remove();
    mainTitle.innerHTML="⚠️ QR EXPIRED! PLEASE RELOAD";
    mainTitle.style.color="var(--expired)";
    legend.innerHTML="";
  } else {
    progressBar.value=30-timeleft;
    timeleft-=1;
  }
},1000);
</script>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
